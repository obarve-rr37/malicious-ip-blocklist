name: Update blocklist

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests PyGithub schedule

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.BLOCKLIST_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python ip_scraper.py --once

      - name: Commit blocklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --staged --quiet || git commit -m "chore: update blocklist [skip ci]"
          git push
